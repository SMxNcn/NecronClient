name: Build and Conditional Sync

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    environment: BUILD_SYNC

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew build

      - name: Debug build outputs
        run: |
          echo "=== 构建产物调试信息 ==="
          echo "JAR文件列表:"
          find build -name "*.jar" -type f | while read file; do
            echo "  - $file ($(basename "$file"))"
          done
          echo "ZIP文件列表:"
          ls -la build/distributions/*.zip 2>/dev/null || echo "无ZIP文件"

      - name: Upload build artifacts (Always)
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ github.sha }}
          path: |
            build/libs/*.jar
            build/distributions/*.zip
          retention-days: 30

      - name: Check for sync trigger
        id: check_sync
        run: |
          if [[ "${{ github.event.head_commit.message }}" == *"#sync"* ]]; then
            echo "SYNC_REQUIRED=true" >> $GITHUB_OUTPUT
            echo "Detected #sync trigger in commit message"
          else
            echo "SYNC_REQUIRED=false" >> $GITHUB_OUTPUT
            echo "No #sync trigger found, skipping Gitee sync"
          fi

      - name: Process and Sync to Gitee
        if: steps.check_sync.outputs.SYNC_REQUIRED == 'true'
        run: |
          echo "Starting sync to Gitee..."
          
          # 配置 Git
          git config --global user.name "GitHub Actions"
          git config --global user.email "${{ secrets.GITEE_EMAIL }}"
          
          # 克隆 Gitee 资源仓库
          git clone https://${{ secrets.GITEE_USERNAME }}:${{ secrets.GITEE_TOKEN }}@gitee.com/mixturedg/necron-client.git gitee-assets
          
          # 设置时间变量
          BUILD_DATE=$(date +"%y%m%d.%H%M")
          FULL_DATE=$(date +"%Y-%m-%d %H:%M:%S")
          COMMIT_HASH=${GITHUB_SHA:0:8}
          
          # 创建目录结构
          mkdir -p "gitee-assets/latest"
          mkdir -p "gitee-assets/releases"
          
          # 处理 ZIP 文件：解压并提取非 dev 版本的 JAR
          for zipfile in build/distributions/*.zip; do
            if [ -f "$zipfile" ]; then
              echo "处理ZIP文件: $zipfile"
          
              # 创建临时解压目录
              mkdir -p "temp-unzip"
          
              # 解压 ZIP 文件
              unzip -q "$zipfile" -d "temp-unzip"
          
              # 查找并处理非 dev 版本的 JAR 文件
              for jarfile in "temp-unzip"/*.jar; do
                if [ -f "$jarfile" ] && [[ "$jarfile" != *"-dev.jar" ]]; then
                  JAR_BASENAME=$(basename "$jarfile" .jar)
                  NEW_JAR_NAME="${JAR_BASENAME}-${BUILD_DATE}.jar"
          
                  echo "处理JAR文件: $JAR_BASENAME -> $NEW_JAR_NAME"
          
                  # 复制到 releases 目录（历史版本，带时间戳）
                  cp "$jarfile" "gitee-assets/releases/${NEW_JAR_NAME}"
          
                  # 复制到 latest 目录（固定文件名）
                  cp "$jarfile" "gitee-assets/latest/${JAR_BASENAME}.jar"
          
                  echo "✅ 已添加: releases/${NEW_JAR_NAME}"
                  echo "✅ 已更新: latest/${JAR_BASENAME}.jar"
                fi
              done
          
              # 清理临时目录
              rm -rf "temp-unzip"
            fi
          done
          
          # 也处理单独的 JAR 文件（如果有）
          for jarfile in build/libs/*.jar; do
            if [ -f "$jarfile" ] && [[ "$jarfile" != *"-dev.jar" ]]; then
              JAR_BASENAME=$(basename "$jarfile" .jar)
              NEW_JAR_NAME="${JAR_BASENAME}-${BUILD_DATE}.jar"
          
              echo "处理独立JAR文件: $JAR_BASENAME -> $NEW_JAR_NAME"
          
              # 复制到 releases 目录
              cp "$jarfile" "gitee-assets/releases/${NEW_JAR_NAME}"
          
              # 复制到 latest 目录
              cp "$jarfile" "gitee-assets/latest/${JAR_BASENAME}.jar"
            fi
          done
          
          # 更新 build-info.txt（追加到文件开头）
          INFO_FILE="gitee-assets/build-info.txt"
          TEMP_INFO="temp-build-info.txt"
          
          # 创建新的构建信息块
          {
            echo "=== Build $BUILD_DATE ==="
            echo "构建时间: $FULL_DATE"
            echo "提交哈希: $COMMIT_HASH"
            echo "触发提交: ${{ github.event.head_commit.message }}"
            echo "GitHub运行ID: $GITHUB_RUN_ID"
            echo "同步文件:"
            for file in gitee-assets/releases/*.jar; do
              if [ -f "$file" ] && [[ "$file" == *"-${BUILD_DATE}.jar" ]]; then
                FILENAME=$(basename "$file")
                FILESIZE=$(stat -c%s "$file")
                echo "  - $FILENAME ($((FILESIZE / 1024)) KB)"
              fi
            done
            echo ""
          } > "$TEMP_INFO"
          
          # 将新内容添加到原有内容前面
          if [ -f "$INFO_FILE" ]; then
            cat "$INFO_FILE" >> "$TEMP_INFO"
          fi
          
          mv "$TEMP_INFO" "$INFO_FILE"
          
          # 提交到 Gitee
          cd gitee-assets
          git add .
          git commit -m "Auto-sync: $BUILD_DATE
          
          Latest: $(ls -1 latest/ | tr '\n' ' ')
          Releases: $(find releases -name "*-${BUILD_DATE}.jar" -exec basename {} \; | tr '\n' ' ')
          "
          
          git push origin main
          
          echo "✅ 成功同步到 Gitee 资源仓库!"
          echo "📁 Latest目录内容:"
          ls -la "latest/" 2>/dev/null || echo "无文件"
          echo "📁 新增Release文件:"
          find "releases" -name "*-${BUILD_DATE}.jar" -exec basename {} \; 2>/dev/null || echo "无新文件"